apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-backend-deployment

spec:
  replicas: 2
  selector:
    matchLabels: 
      app: ecom-backend
        
  template:
    metadata:
      labels:
        app: ecom-backend

    spec:
      containers:
        - name: ecom-backend-pod
          image: shivamkumbhar05/shop-backend:v2
          ports:
            - containerPort: 8080

          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET

            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI

            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_EMAIL

            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_PASSWORD

            - name: ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ADMIN_NAME
